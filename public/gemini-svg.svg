<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#050505"/>

  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="clip-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="22" y="22" width="56" height="62" rx="4" fill="#121212" stroke="#2A2A2A" stroke-width="2"/>
  
  <line x1="32" y1="36" x2="68" y2="36" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="55" y2="46" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

  <rect x="40" y="16" width="20" height="8" rx="2" fill="#FF107A" filter="url(#clip-glow)"/>
  <rect x="43" y="15" width="14" height="4" rx="2" fill="#FFB3D6" />

  <text x="50%" y="76%" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="#FF107A" text-anchor="middle" filter="url(#neon-glow)">r</text>
  
  <text x="50%" y="76%" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="#FFB3D6" text-anchor="middle">r</text>
</svg>
